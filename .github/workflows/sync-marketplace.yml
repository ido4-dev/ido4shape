name: Sync Marketplace

# Gated on CI passing — never publishes a commit that failed validation.
# Sync is idempotent (skips if marketplace already matches), so it's safe
# to fire on every successful CI run, not just plugin.json changes.
on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]

jobs:
  sync:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    permissions:
      contents: write
    steps:
      - name: Checkout ido4shape (the SHA CI validated)
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          path: source

      - name: Read version from plugin.json
        id: version
        run: |
          VERSION=$(python3 -c "import json; print(json.load(open('source/.claude-plugin/plugin.json'))['version'])")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Plugin version: $VERSION"

      - name: Checkout ido4-plugins marketplace
        uses: actions/checkout@v4
        with:
          repository: ido4-dev/ido4-plugins
          token: ${{ secrets.MARKETPLACE_TOKEN }}
          path: marketplace

      - name: Sync plugin directory
        run: |
          # Remove old plugin copy entirely
          rm -rf marketplace/plugins/ido4shape

          # Copy all plugin files, excluding dev-only content
          mkdir -p marketplace/plugins/ido4shape
          rsync -av \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='.claude' \
            --exclude='.ido4shape' \
            --exclude='drafts' \
            --exclude='reports' \
            --exclude='*.plan.md' \
            --exclude='docs' \
            --exclude='node_modules' \
            --exclude='tests' \
            --exclude='ido4-simulate*' \
            source/ marketplace/plugins/ido4shape/

          echo "Synced plugin directory"

      - name: Update marketplace manifest
        run: |
          python3 -c "
          import json
          plugin_path = 'source/.claude-plugin/plugin.json'
          market_path = 'marketplace/.claude-plugin/marketplace.json'
          plugin = json.load(open(plugin_path))
          d = json.load(open(market_path))
          for p in d['plugins']:
              if p['name'] == 'ido4shape':
                  p['version'] = plugin['version']
                  p['description'] = plugin.get('description', p.get('description', ''))
                  if 'category' in plugin:
                      p['category'] = plugin['category']
          json.dump(d, open(market_path, 'w'), indent=2)
          "
          echo "Updated marketplace.json to v${{ steps.version.outputs.version }}"

      - name: Commit and push marketplace
        run: |
          cd marketplace
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to sync"
            exit 0
          fi
          git commit -m "sync ido4shape v${{ steps.version.outputs.version }}"
          # Retry with rebase to handle concurrent pushes from sibling sync
          # workflows. Multiple plugin repos sync to the same ido4-plugins/main;
          # without retry, whichever job pushes second loses the race.
          attempt=1
          until git push; do
            if [ "$attempt" -ge 5 ]; then
              echo "::error::Push failed after 5 attempts"
              exit 1
            fi
            echo "Push rejected (attempt $attempt/5) — fetching and rebasing"
            sleep $((attempt * 2))
            if ! git pull --rebase; then
              echo "::error::Rebase conflict — concurrent edits touched overlapping content"
              git rebase --abort 2>/dev/null || true
              exit 1
            fi
            attempt=$((attempt + 1))
          done

      - name: Create GitHub Release
        working-directory: source
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="v${{ steps.version.outputs.version }}"
          if gh release view "$VERSION" >/dev/null 2>&1; then
            echo "Release $VERSION already exists — skipping"
          else
            gh release create "$VERSION" \
              --title "$VERSION" \
              --generate-notes \
              --latest
          fi
