name: Sync Marketplace

on:
  push:
    branches: [main]
    paths:
      - '.claude-plugin/plugin.json'

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout ido4shape
        uses: actions/checkout@v4

      - name: Read version from plugin.json
        id: version
        run: |
          VERSION=$(python3 -c "import json; print(json.load(open('.claude-plugin/plugin.json'))['version'])")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Plugin version: $VERSION"

      - name: Checkout ido4-plugins marketplace
        uses: actions/checkout@v4
        with:
          repository: ido4-dev/ido4-plugins
          token: ${{ secrets.MARKETPLACE_TOKEN }}
          path: marketplace

      - name: Update marketplace version
        run: |
          python3 -c "
          import json
          path = 'marketplace/.claude-plugin/marketplace.json'
          d = json.load(open(path))
          for p in d['plugins']:
              if p['name'] == 'ido4shape':
                  p['version'] = '${{ steps.version.outputs.version }}'
          json.dump(d, open(path, 'w'), indent=2)
          "
          echo "Updated marketplace.json to v${{ steps.version.outputs.version }}"

      - name: Check for changes
        id: changes
        run: |
          cd marketplace
          if git diff --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No version change detected"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "Version change detected"
          fi

      - name: Commit and push marketplace
        if: steps.changes.outputs.changed == 'true'
        run: |
          cd marketplace
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .claude-plugin/marketplace.json
          git commit -m "ido4shape v${{ steps.version.outputs.version }}"
          git push

      - name: Create GitHub Release
        if: steps.changes.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="v${{ steps.version.outputs.version }}"
          gh release create "$VERSION" \
            --title "$VERSION" \
            --generate-notes \
            --latest
