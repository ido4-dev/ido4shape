name: Sync Marketplace

on:
  push:
    branches: [main]
    paths:
      - '.claude-plugin/plugin.json'

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout ido4shape
        uses: actions/checkout@v4
        with:
          path: source

      - name: Read version from plugin.json
        id: version
        run: |
          VERSION=$(python3 -c "import json; print(json.load(open('source/.claude-plugin/plugin.json'))['version'])")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Plugin version: $VERSION"

      - name: Checkout ido4-plugins marketplace
        uses: actions/checkout@v4
        with:
          repository: ido4-dev/ido4-plugins
          token: ${{ secrets.MARKETPLACE_TOKEN }}
          path: marketplace

      - name: Sync plugin directory
        run: |
          # Remove old plugin copy entirely
          rm -rf marketplace/plugins/ido4shape

          # Copy all plugin files, excluding dev-only content
          mkdir -p marketplace/plugins/ido4shape
          rsync -av \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='.claude' \
            --exclude='.ido4shape' \
            --exclude='drafts' \
            --exclude='reports' \
            --exclude='*.plan.md' \
            --exclude='VISION.md' \
            --exclude='node_modules' \
            source/ marketplace/plugins/ido4shape/

          echo "Synced plugin directory"

      - name: Update marketplace manifest
        run: |
          python3 -c "
          import json
          path = 'marketplace/.claude-plugin/marketplace.json'
          d = json.load(open(path))
          for p in d['plugins']:
              if p['name'] == 'ido4shape':
                  p['version'] = '${{ steps.version.outputs.version }}'
          json.dump(d, open(path, 'w'), indent=2)
          "
          echo "Updated marketplace.json to v${{ steps.version.outputs.version }}"

      - name: Commit and push marketplace
        run: |
          cd marketplace
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to sync"
            exit 0
          fi
          git commit -m "sync ido4shape v${{ steps.version.outputs.version }}"
          git push

      - name: Create GitHub Release
        working-directory: source
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="v${{ steps.version.outputs.version }}"
          gh release create "$VERSION" \
            --title "$VERSION" \
            --generate-notes \
            --latest
